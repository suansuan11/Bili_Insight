spring:
  application:
    name: Bili_Insight
  datasource:
      url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bili_insight_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&allowMultiQueries=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&tinyInt1isBit=false&allowLoadLocalInfile=true&allowLocalInfileInMultiQueries=true&allowUrlInLocalInfile=true}
      username: ${SPRING_DATASOURCE_USERNAME:root}
      password: ${SPRING_DATASOURCE_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
  # 异步任务线程池配置
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
        keep-alive: 60s
      thread-name-prefix: async-task-

python:
  executor:
    command: python
    scripts-directory: scripts
    data-output-directory: data
  service:
    url: ${PYTHON_SERVICE_URL:http://localhost:8001}

mybatis:
  mapper-locations: classpath:com/ecut/bili_insight/mapper/*.xml
  type-aliases-package: com.ecut.bili_insight.entity
  configuration:
    map-underscore-to-camel-case: true
