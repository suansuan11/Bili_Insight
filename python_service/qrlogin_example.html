<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站扫码登录示例</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
        }
        #qrcode {
            margin: 20px auto;
            display: inline-block;
        }
        .status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .status.pending { background: #fff3cd; }
        .status.scanned { background: #d1ecf1; }
        .status.confirmed { background: #d4edda; }
        .status.expired { background: #f8d7da; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>B站扫码登录</h1>

    <button onclick="startLogin()">获取二维码</button>

    <div id="qrcode"></div>
    <div id="status" class="status" style="display:none;"></div>
    <div id="result" style="display:none;">
        <h3>登录成功！</h3>
        <p>SESSDATA: <code id="sessdata"></code></p>
    </div>

    <script>
        const PYTHON_API = 'http://localhost:18001/api';
        let pollInterval = null;

        async function startLogin() {
            // 清空之前的内容
            document.getElementById('qrcode').innerHTML = '';
            document.getElementById('result').style.display = 'none';

            if (pollInterval) {
                clearInterval(pollInterval);
            }

            try {
                // 1. 获取二维码
                const response = await fetch(`${PYTHON_API}/login/qrcode`);
                const data = await response.json();

                // 2. 生成二维码图片
                new QRCode(document.getElementById('qrcode'), {
                    text: data.qrcode_url,
                    width: 256,
                    height: 256
                });

                // 3. 显示状态
                showStatus('pending', '请使用B站APP扫描二维码');

                // 4. 开始轮询状态
                startPolling(data.qrcode_key);

            } catch (error) {
                alert('获取二维码失败: ' + error.message);
            }
        }

        function startPolling(qrcodeKey) {
            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${PYTHON_API}/login/status/${qrcodeKey}?auto_save=true`);
                    const data = await response.json();

                    showStatus(data.status, data.message);

                    if (data.status === 'confirmed') {
                        // 登录成功
                        clearInterval(pollInterval);
                        document.getElementById('sessdata').textContent = data.sessdata;
                        document.getElementById('result').style.display = 'block';

                        alert('登录成功！凭证已自动保存到Python服务');
                    } else if (data.status === 'expired') {
                        // 二维码过期
                        clearInterval(pollInterval);
                        alert('二维码已过期，请重新获取');
                    }

                } catch (error) {
                    console.error('轮询失败:', error);
                }
            }, 2000); // 每2秒检查一次
        }

        function showStatus(status, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.className = 'status ' + status;

            const icons = {
                pending: '⏳',
                scanned: '📱',
                confirmed: '✅',
                expired: '❌'
            };

            statusDiv.textContent = (icons[status] || '') + ' ' + message;
        }
    </script>
</body>
</html>
